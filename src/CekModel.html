<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Gemini API Scanner</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-white p-10 font-sans">
  <div class="max-w-4xl mx-auto">
    <div class="mb-8">
      <h1 class="text-3xl font-bold mb-2 flex items-center gap-3">
        <span class="text-teal-400">⚡</span> Gemini API Scanner
      </h1>
      <p class="text-gray-400">Cek daftar nama model AI (versi terbaru 2026) yang aktif dan tersedia untuk API Key kamu.</p>
    </div>

    <div class="flex flex-col md:flex-row gap-4 mb-8">
      <input type="text" id="apiKey" placeholder="Paste Gemini API Key kamu di sini..." class="flex-1 p-4 rounded-xl bg-white/5 border border-white/10 focus:outline-none focus:border-teal-500 text-white">
      <button onclick="cekModels()" class="bg-teal-500 hover:bg-teal-400 text-gray-900 font-bold py-4 px-8 rounded-xl transition-colors shadow-lg shadow-teal-500/20">
        Scan Database Google
      </button>
    </div>

    <div id="loading" class="hidden text-teal-400 mb-4 animate-pulse">Sedang membongkar data dari server Google...</div>
    <div id="error" class="hidden text-red-400 mb-4 p-4 bg-red-500/10 border border-red-500/20 rounded-xl"></div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6" id="result"></div>
  </div>

  <script>
    async function cekModels() {
      const apiKey = document.getElementById('apiKey').value.trim();
      const resultDiv = document.getElementById('result');
      const loadingDiv = document.getElementById('loading');
      const errorDiv = document.getElementById('error');

      if (!apiKey) return alert("Jangan lupa masukin API Key-nya ya!");

      resultDiv.innerHTML = '';
      errorDiv.classList.add('hidden');
      loadingDiv.classList.remove('hidden');

      try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
        const data = await response.json();

        loadingDiv.classList.add('hidden');

        if (data.error) throw new Error(data.error.message);

        data.models.forEach(model => {
          // Hanya tampilkan model yang mendukung generateContent (pembuatan teks)
          if (model.supportedGenerationMethods.includes('generateContent')) {
            const exactModelName = model.name.replace('models/', '');
            
            const card = document.createElement('div');
            card.className = 'bg-white/5 p-6 rounded-2xl border border-white/10 hover:border-teal-500/50 transition-colors relative overflow-hidden group';
            card.innerHTML = `
              <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
              </div>
              <h3 class="font-bold text-xl text-white mb-2 relative z-10">${model.displayName}</h3>
              <div class="mb-4 relative z-10">
                <span class="text-xs text-gray-500 uppercase tracking-widest">KODE MODEL (Copy ini):</span>
                <code class="text-teal-400 text-lg block mt-1 bg-black/30 p-2 rounded-lg border border-white/5 select-all">${exactModelName}</code>
              </div>
              <p class="text-sm text-gray-400 mb-4 line-clamp-2 relative z-10">${model.description}</p>
              <div class="text-[10px] font-bold uppercase tracking-widest bg-teal-500/10 text-teal-400 inline-block px-3 py-1.5 rounded-full border border-teal-500/20 relative z-10">
                Active Version
              </div>
            `;
            resultDiv.appendChild(card);
          }
        });

      } catch (err) {
        loadingDiv.classList.add('hidden');
        errorDiv.classList.remove('hidden');
        errorDiv.innerText = "Error: " + err.message;
      }
    }
  </script>
</body>
</html>
